<div class="flex align-items-center justify-content-center min-h-screen bg-gray-50">
  <p-card header="{{ title }}" class="w-11 md:w-8 lg:w-6">
    <div class="text-center mb-4">
      <h2 class="text-3xl font-bold mb-3">Welcome to Angular 19 with PrimeNG!</h2>
      <p class="text-lg mb-4">This application is ready with PrimeNG and PrimeFlex packages.</p>
    </div>
    
    <div class="flex flex-column gap-3">
      <div class="p-3 surface-100 border-round">
        <i class="pi pi-check-circle text-green-500 mr-2"></i>
        <span class="font-semibold">Angular 19</span> - Latest Angular framework
      </div>
      <div class="p-3 surface-100 border-round">
        <i class="pi pi-check-circle text-green-500 mr-2"></i>
        <span class="font-semibold">PrimeNG</span> - Rich UI component library
      </div>
      <div class="p-3 surface-100 border-round">
        <i class="pi pi-check-circle text-green-500 mr-2"></i>
        <span class="font-semibold">PrimeFlex</span> - Utility-first CSS framework
      </div>
    </div>

    <div class="flex gap-2 mt-4 justify-content-center">
      <p-button label="Get Started" icon="pi pi-play" severity="success"></p-button>
      <p-button label="Learn More" icon="pi pi-info-circle" severity="info" [outlined]="true"></p-button>
    </div>
  </p-card>
</div>

<router-outlet />
